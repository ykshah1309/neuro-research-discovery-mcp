name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dep audit + integration check so we catch CVEs and upstream API
    # regressions without depending on PR cadence.
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Also run live integration tests"
        type: boolean
        default: false

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev/audit deps with bit-identical pins
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit pipdeptree -c constraints-dev.txt
      - name: Run pip-audit on the runtime closure
        # Audit only the runtime dependency set; dev tooling churn doesn't
        # block releases for our users.
        run: pip-audit --strict --progress-spinner off -r constraints.txt

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps with bit-identical pins
        # constraints-dev.txt pins both the runtime AND the test runner +
        # audit tooling, so this install is fully reproducible.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints-dev.txt
      - name: Unit tests
        run: pytest tests/ --ignore=tests/test_integration.py -q

  integration:
    # Opt-in: live API calls. Runs only when:
    #   - workflow_dispatch is fired AND inputs.run_integration is true, OR
    #   - the weekly cron schedule fires.
    # Plain workflow_dispatch with run_integration=false (the default) skips it.
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
      || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with pinned dev constraints for reproducible CI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -c constraints-dev.txt
      - name: Live integration tests
        env:
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL || 'ci@example.com' }}
        run: pytest tests/test_integration.py -m integration -q
